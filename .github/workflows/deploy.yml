name: CI and D1 Migrations

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  test:
    name: Test and build
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-test
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.21.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  deploy:
    name: Deploy Worker
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: tokenboard-production-migrations
      cancel-in-progress: false
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      TOKENBOARD_WRANGLER_CONFIG: wrangler.production.ci.jsonc
      TOKENBOARD_WORKER_ROUTE: ${{ vars.TOKENBOARD_WORKER_ROUTE }}
      BETTER_AUTH_URL: ${{ vars.BETTER_AUTH_URL }}
      D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.21.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create production Wrangler config
        working-directory: apps/web
        run: node scripts/write-production-config.mjs wrangler.production.example.jsonc "$TOKENBOARD_WRANGLER_CONFIG"

      - name: Validate production Wrangler config
        working-directory: apps/web
        run: node scripts/check-production-config.mjs

      - name: Build Worker
        working-directory: apps/web
        run: pnpm run build

      - name: Apply D1 migrations
        working-directory: apps/web
        run: pnpm exec wrangler d1 migrations apply DB --remote --config "$TOKENBOARD_WRANGLER_CONFIG"

      - name: Deploy Worker
        working-directory: apps/web
        run: pnpm exec wrangler deploy --config "$TOKENBOARD_WRANGLER_CONFIG"
